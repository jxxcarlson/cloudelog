# nginx server block for cloudelog.
#
# Install (on the droplet, from the repo root):
#   sudo cp deploy/nginx/cloudelog.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/cloudelog.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then get the TLS cert:
#   sudo certbot --nginx -d cloudelog.app
#
# Certbot reads this HTTP-only block, adds a parallel `listen 443 ssl`
# block with the right cert paths, and inserts an HTTP → HTTPS redirect.
# All "managed by Certbot" edits land in the installed copy under
# /etc/nginx/sites-available/; do NOT copy those edits back to this file
# (keep this one HTTP-only so re-running `cp` doesn't clobber the cert
# section).

server {
    listen 80;
    server_name cloudelog.app;

    # Static frontend (built with: `elm make src/Main.elm --optimize --output=elm.js`).
    root /root/cloudelog/frontend;
    index index.html;

    # Cache the elm bundle; query-string-bust when you ship a new build.
    location = /elm.js {
        add_header Cache-Control "public, max-age=3600";
    }

    # Favicon
    location = /favicon.svg {
        add_header Cache-Control "public, max-age=86400";
    }

    # API passthrough to the Haskell backend. Must match PORT in .env.
    location /api/ {
        proxy_pass http://127.0.0.1:8087;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Everything else → static files, with SPA fallback to index.html so
    # deep-links like /logs/<uuid> reload cleanly.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't leak dotfiles, source trees, or build artifacts.
    location ~ /\.(git|env|stack-work) { deny all; }
    location /src/          { deny all; }
    location /tests/        { deny all; }
    location /elm-stuff/    { deny all; }
}
